services:
  db:
    image: postgres:16-alpine
    container_name: ledgerseiri_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ledgerseiri
      POSTGRES_USER: ledgerseiri
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - dbdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  api:
    build:
      context: ./apps/api
    container_name: ledgerseiri_api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env.production
    depends_on:
      - db
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - /opt/ledgerseiri-data/attachments:/app-data/attachments

    environment:
      AMAZON_SP_API_ORDERS_REAL_PREVIEW_ROUTE_ENABLED: ${AMAZON_SP_API_ORDERS_REAL_PREVIEW_ROUTE_ENABLED:-false}
      AMAZON_SP_API_ORDERS_REAL_PREVIEW_TRANSPORT: ${AMAZON_SP_API_ORDERS_REAL_PREVIEW_TRANSPORT:-mocked}
      AMAZON_SP_API_ORDERS_REAL_NETWORK_ENABLED: ${AMAZON_SP_API_ORDERS_REAL_NETWORK_ENABLED:-false}
      AMAZON_SP_API_ORDERS_TRANSPORT_MODE: ${AMAZON_SP_API_ORDERS_TRANSPORT_MODE:-mocked-server-transport}
      AMAZON_SP_API_ORDERS_AWS_ACCESS_KEY_ID: ${AMAZON_SP_API_ORDERS_AWS_ACCESS_KEY_ID:-}
      AMAZON_SP_API_ORDERS_AWS_SECRET_ACCESS_KEY: ${AMAZON_SP_API_ORDERS_AWS_SECRET_ACCESS_KEY:-}
      AMAZON_SP_API_ORDERS_AWS_SESSION_TOKEN: ${AMAZON_SP_API_ORDERS_AWS_SESSION_TOKEN:-}
      AMAZON_SP_API_ORDERS_RAW_SIGNED_HTTP_TIMEOUT_MS: ${AMAZON_SP_API_ORDERS_RAW_SIGNED_HTTP_TIMEOUT_MS:-15000}
      AMAZON_SP_API_ORDERS_LWA_REFRESH_ENABLED: ${AMAZON_SP_API_ORDERS_LWA_REFRESH_ENABLED:-false}
      AMAZON_SP_API_LWA_CLIENT_ID: ${AMAZON_SP_API_LWA_CLIENT_ID:-}
      AMAZON_SP_API_LWA_CLIENT_SECRET: ${AMAZON_SP_API_LWA_CLIENT_SECRET:-}
      AMAZON_SP_API_LWA_TOKEN_ENDPOINT: ${AMAZON_SP_API_LWA_TOKEN_ENDPOINT:-https://api.amazon.com/auth/o2/token}
      AMAZON_SP_API_ORDERS_REFRESH_TOKEN_DECRYPTOR_MODE: ${AMAZON_SP_API_ORDERS_REFRESH_TOKEN_DECRYPTOR_MODE:-disabled}
      AMAZON_SP_API_ORDERS_REFRESH_TOKEN_DECRYPTOR_ALLOW_PLAIN_PREFIX: ${AMAZON_SP_API_ORDERS_REFRESH_TOKEN_DECRYPTOR_ALLOW_PLAIN_PREFIX:-false}
      AMAZON_SP_API_ORDERS_ACCESS_TOKEN_DECRYPTOR_MODE: ${AMAZON_SP_API_ORDERS_ACCESS_TOKEN_DECRYPTOR_MODE:-disabled}
      AMAZON_SP_API_ORDERS_ACCESS_TOKEN_DECRYPTOR_ALLOW_PLAIN_PREFIX: ${AMAZON_SP_API_ORDERS_ACCESS_TOKEN_DECRYPTOR_ALLOW_PLAIN_PREFIX:-false}
      AMAZON_SP_API_ORDERS_ACCESS_TOKEN_CACHE_ENCRYPTOR_MODE: ${AMAZON_SP_API_ORDERS_ACCESS_TOKEN_CACHE_ENCRYPTOR_MODE:-disabled}
      AMAZON_SP_API_ORDERS_ACCESS_TOKEN_CACHE_ENCRYPTOR_ALLOW_PLAIN_PREFIX: ${AMAZON_SP_API_ORDERS_ACCESS_TOKEN_CACHE_ENCRYPTOR_ALLOW_PLAIN_PREFIX:-false}
  web:
    build:
      context: ./apps/web
    container_name: ledgerseiri_web
    restart: unless-stopped
    env_file:
      - ./apps/web/.env.production
    depends_on:
      - api
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  dbdata:
